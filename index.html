<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Todo Uygulaması</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth Ekranı -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h1>Yapılacaklar</h1>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Giriş Yap</button>
        <button class="auth-tab" data-tab="register">Kayıt Ol</button>
      </div>
      <div id="auth-message" class="auth-message hidden"></div>
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="E-posta" required />
        <input type="password" id="auth-password" placeholder="Şifre (min. 6 karakter)" required minlength="6" />
        <button type="submit" id="auth-submit-btn">Giriş Yap</button>
      </form>
    </div>
  </div>

  <!-- Uygulama -->
  <div id="app-screen" class="hidden">
    <div class="container">
      <div class="app-header">
        <h1>Yapılacaklar</h1>
        <div class="user-info">
          <span id="user-email-display"></span>
          <button id="notify-btn" class="notify-btn hidden" title="Bildirimleri aç">🔔</button>
          <button id="gcal-btn" class="notify-btn hidden" title="Google Calendar'a bağla">🗓️</button>
          <button id="logout-btn">Çıkış</button>
        </div>
      </div>

      <!-- Yeni görev formu -->
      <div class="input-area">
        <input type="text" id="todo-input" placeholder="Yeni görev ekle..." />
        <button id="add-btn">Ekle</button>
      </div>
      <div class="extra-fields">
        <div class="field-group">
          <label for="todo-due">Tarih &amp; Saat</label>
          <input type="datetime-local" id="todo-due" />
        </div>
        <div class="field-group">
          <label for="todo-remind">Hatırlatma</label>
          <select id="todo-remind">
            <option value="">Hatırlatma Yok</option>
            <option value="15">15 dakika önce</option>
            <option value="60">1 saat önce</option>
            <option value="180">3 saat önce</option>
            <option value="1440">1 gün önce</option>
            <option value="10080">1 hafta önce</option>
          </select>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Tümü</button>
        <button class="filter-btn" data-filter="active">Aktif</button>
        <button class="filter-btn" data-filter="completed">Tamamlanan</button>
        <button class="filter-btn" data-filter="upcoming">Yaklaşan</button>
      </div>

      <ul id="todo-list"></ul>

      <div class="footer">
        <span id="remaining">0 görev kaldı</span>
        <button id="clear-btn">Tamamlananları Sil</button>
      </div>
    </div>
  </div>

  <!-- Düzenleme Modalı -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2>Görevi Düzenle</h2>
      <div class="modal-field">
        <label for="modal-text">Görev</label>
        <input type="text" id="modal-text" />
      </div>
      <div class="modal-field">
        <label for="modal-due">Tarih &amp; Saat</label>
        <input type="datetime-local" id="modal-due" />
      </div>
      <div class="modal-field">
        <label for="modal-remind">Hatırlatma</label>
        <select id="modal-remind">
          <option value="">Hatırlatma Yok</option>
          <option value="15">15 dakika önce</option>
          <option value="60">1 saat önce</option>
          <option value="180">3 saat önce</option>
          <option value="1440">1 gün önce</option>
          <option value="10080">1 hafta önce</option>
        </select>
      </div>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="modal-btn cancel">İptal</button>
        <button id="modal-save-btn" class="modal-btn save">Kaydet</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
